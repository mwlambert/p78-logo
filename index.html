<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P78 — Orbital Logo Tool</title>
<style>
  :root{--orange:#ff5500;--black:#141615;--ink:#e7e9e3;--panel:#11141a;--line:#222833;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:#06080d;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    height:100vh;overflow:hidden;}
  .app{display:flex;height:100vh}
  .rail{width:368px;flex:none;overflow-y:auto;padding:16px 16px 40px;border-right:1px solid var(--line);background:#080a10}
  .railhead{margin-bottom:14px}
  .railhead h1{font-weight:600;font-size:15px;margin:0 0 2px}
  .railhead .sub{font-size:11px;opacity:.45;margin-bottom:10px}
  .railhead .row{margin-top:0}
  .viewport{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;background:#06080d}
  .stage{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#000}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}

  details{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:#0b0e14}
  summary{cursor:pointer;padding:10px 12px;font-weight:600;font-size:12px;list-style:none;display:flex;justify-content:space-between;align-items:center}
  summary::-webkit-details-marker{display:none}
  summary::after{content:'▸';opacity:.45}
  details[open] summary::after{content:'▾'}
  .sect{padding:2px 12px 11px;display:flex;flex-direction:column;gap:9px}

  .control{display:flex;flex-direction:column;gap:3px}
  .control label{display:flex;align-items:center;gap:8px;opacity:.75;font-size:11.5px}
  .control label .nm{flex:1}
  /* slim custom slider (~15% smaller than browser default) */
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:3px;background:#283140;cursor:pointer;margin:3px 0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--orange);border:none}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--orange);border:none}
  input[type=range]::-moz-range-track{height:4px;border-radius:3px;background:#283140}
  .num{width:64px;text-align:right;color:#ff9a5c;font-weight:600;font-variant-numeric:tabular-nums;
    background:#0c0f15;border:1px solid var(--line);border-radius:5px;padding:2px 6px;font-family:inherit;font-size:12px}

  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:2px;font-size:12px}
  button{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:7px 12px;font-size:12px;cursor:pointer;font-family:inherit}
  button:hover{border-color:#3a4556}
  .row label{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.85}
  .lbl{opacity:.5;font-weight:600;letter-spacing:.03em;text-transform:uppercase;font-size:10px;width:100%}
  select,input[type=text]{font-family:inherit;font-size:12px;background:#0c0f15;color:var(--ink);
    border:1px solid var(--line);border-radius:6px;padding:7px 8px}
  input[type=color]{width:36px;height:30px;padding:0;border:1px solid var(--line);border-radius:6px;background:#0c0f15;cursor:pointer}
  .spacer{flex:1}

  .rec-exit{position:fixed;top:14px;right:16px;z-index:10;display:none;background:rgba(0,0,0,.4);color:#fff;
    border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 12px;font-size:11px;cursor:pointer;backdrop-filter:blur(6px)}
  body.rec .rail{display:none}
  body.rec .viewport{padding:0}
  body.rec .rec-exit{display:block}
</style>
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="railhead">
        <h1>P78 — Orbital Logo Tool</h1>
        <div class="sub">Constellation of satellites on real Keplerian orbits.</div>
        <div class="row">
          <button id="replay">↻ Replay</button>
          <button id="theme">Theme: White on Black</button>
          <button id="rec">⤢ Record</button>
        </div>
      </div>

      <details open><summary>Orbit elements</summary>
        <div class="sect"><div id="g-orbit"></div></div>
      </details>

      <details open><summary>Animation</summary>
        <div class="sect">
          <div id="g-anim"></div>
          <div class="row">
            <label><input type="checkbox" id="loop"> Loop</label>
            <label><input type="checkbox" id="sat" checked> Satellites</label>
            <label><input type="checkbox" id="fly" checked> Fly</label>
          </div>
        </div>
      </details>

      <details><summary>View</summary>
        <div class="sect">
          <div id="g-view"></div>
          <div class="row">
            <button id="resetview">⤾ Reset view</button>
            <label><input type="checkbox" id="body"> Body</label>
            <label><input type="checkbox" id="occlude"> Occlusion</label>
            <label><input type="checkbox" id="stars"> Starfield</label>
          </div>
        </div>
      </details>

      <details><summary>Style &amp; wordmark</summary>
        <div class="sect">
          <div id="g-style"></div>
          <div class="row">
            <span class="lbl">Background</span>
            <label><input type="checkbox" id="cbg"> Custom</label>
            <input type="color" id="bgcolor" value="#000000">
          </div>
          <div class="row">
            <span class="lbl">Line colour</span>
            <label><input type="checkbox" id="lc"> Custom</label>
            <input type="color" id="linecolor" value="#eef0ea">
          </div>
          <div class="row">
            <label><input type="checkbox" id="wm"> Wordmark</label>
          </div>
          <div class="row">
            <span class="lbl">Wordmark lockup</span>
            <button id="lk-free">Center</button>
            <button id="lk-below">Below</button>
            <button id="lk-right">Right</button>
            <button id="lk-above">Above</button>
          </div>
        </div>
      </details>

      <details><summary>Export</summary>
        <div class="sect">
          <div class="row">
            <select id="aspect" title="Frame aspect ratio">
              <option value="16:10">16:10</option><option value="16:9">16:9</option>
              <option value="1:1">1:1 square</option><option value="4:5">4:5</option><option value="3:2">3:2</option>
            </select>
            <select id="res" title="Export resolution (longest edge)">
              <option value="1024">1024px</option><option value="2048" selected>2048px</option><option value="4096">4096px</option>
            </select>
            <label><input type="checkbox" id="tr"> Transparent</label>
          </div>
          <div class="row">
            <button id="export">⤓ Export PNG</button>
            <button id="exportsvg">⤓ Export SVG</button>
          </div>
        </div>
      </details>

      <details><summary>Presets &amp; share</summary>
        <div class="sect">
          <div class="row">
            <input type="text" id="pname" placeholder="preset name…" style="flex:1;min-width:90px">
            <button id="psave">Save</button>
          </div>
          <div class="row">
            <select id="psel" style="flex:1"><option value="">— load preset —</option></select>
            <button id="pdel">Delete</button>
          </div>
          <div class="row"><button id="copylink">🔗 Copy share link</button></div>
        </div>
      </details>
    </aside>

    <main class="viewport" id="viewport"><div class="stage" id="stage"><canvas id="c"></canvas></div></main>
  </div>
  <button class="rec-exit" id="rec-exit">Exit recording (Esc)</button>

<script>
(function(){
  "use strict";
  const TWO_PI=Math.PI*2, D2R=Math.PI/180;
  const $=id=>document.getElementById(id);

  const THEMES={
    whiteBlack:{label:"White on Black",bgTop:"#0d0f12",bgBot:"#000000",line:"#eef0ea",
      satGlow:"#cfe0ff",satCore:"#ffffff",stars:true,nebula:false,glow:true,flat:false},
    brandFlat:{label:"Brand (orange)",bgTop:"#ff5500",bgBot:"#ff5500",line:"#141615",
      satGlow:"#141615",satCore:"#141615",stars:false,nebula:false,glow:false,flat:true},
  };
  const THEME_ORDER=["whiteBlack","brandFlat"];
  let themeKey="whiteBlack";
  const theme=()=>THEMES[themeKey];

  // ---------- controls registry ----------
  const RANGE=[
    {id:'num',  group:'orbit',label:'Satellites',        min:2,max:60, step:1,   val:14,  restart:true},
    {id:'ecc',  group:'orbit',label:'Eccentricity',      min:0,max:0.85,step:0.01,val:0.6},
    {id:'incs', group:'orbit',label:'Inclination spread',min:0,max:90, step:1,   val:55},
    {id:'raans',group:'orbit',label:'RAAN spread',       min:0,max:180,step:1,   val:20},
    {id:'apod', group:'orbit',label:'Apogee direction',  min:0,max:360,step:1,   val:180},
    {id:'apos', group:'orbit',label:'Apogee spread',     min:0,max:220,step:1,   val:70},
    {id:'dur',  group:'anim', label:'Reveal time',       min:1,max:20, step:0.5, val:3,   restart:true},
    {id:'stagger',group:'anim',label:'Reveal stagger',   min:0,max:1,  step:0.01,val:0},
    {id:'psi',  group:'view', label:'View tilt',         min:0,max:85, step:1,   val:25},
    {id:'roll', group:'view', label:'Roll',              min:-180,max:180,step:1, val:0},
    {id:'scale',group:'view', label:'Scale',             min:0.2,max:3,step:0.05, val:1},
    {id:'lw',   group:'style',label:'Line weight',       min:0.4,max:6,step:0.1,  val:1.6},
    {id:'wmsize',group:'style',label:'Wordmark size',    min:5,max:100,step:1,    val:35},
  ];
  const CHECKS=['loop','sat','fly','body','occlude','stars','wm','cbg','lc'];

  function afterChange(id){
    if(id==='scale') zoom=parseFloat($('scale').value);
    if(id==='dur'||id==='num') restart();
  }
  RANGE.forEach(c=>{
    const wrap=document.createElement('div');wrap.className='control';
    const lab=document.createElement('label');
    const nm=document.createElement('span');nm.className='nm';nm.textContent=c.label;
    const num=document.createElement('input');num.type='number';num.className='num';num.id=c.id+'-n';
    num.min=c.min;num.max=c.max;num.step=c.step;num.value=c.val;
    lab.appendChild(nm);lab.appendChild(num);
    const rng=document.createElement('input');rng.type='range';rng.id=c.id;
    rng.min=c.min;rng.max=c.max;rng.step=c.step;rng.value=c.val;
    wrap.appendChild(lab);wrap.appendChild(rng);
    $('g-'+c.group).appendChild(wrap);
    rng.addEventListener('input',()=>{num.value=rng.value;afterChange(c.id);});
    num.addEventListener('input',()=>{rng.value=num.value;afterChange(c.id);});
  });
  function setRange(id,val){const r=$(id),n=$(id+'-n');if(r)r.value=val;if(n)n.value=val;if(id==='scale')zoom=parseFloat(val);}

  const durEl=$('dur'),numEl=$('num'),staggerEl=$('stagger'),eccEl=$('ecc'),incsEl=$('incs'),raansEl=$('raans'),
        apodEl=$('apod'),aposEl=$('apos'),psiEl=$('psi'),rollEl=$('roll'),scaleEl=$('scale'),lwEl=$('lw'),wmSizeEl=$('wmsize');
  const loopEl=$('loop'),satEl=$('sat'),flyEl=$('fly'),bodyEl=$('body'),occludeEl=$('occlude'),
        starsEl=$('stars'),wmOnEl=$('wm'),customBgEl=$('cbg'),bgcolorEl=$('bgcolor'),transparentEl=$('tr'),
        customLineEl=$('lc'),linecolorEl=$('linecolor'),
        aspectEl=$('aspect'),resEl=$('res'),stageEl=$('stage'),viewportEl=$('viewport');
  const lineHex=()=>customLineEl.checked?linecolorEl.value:theme().line;

  // ---------- canvas ----------
  const canvas=$('c');
  let ctx=canvas.getContext('2d');
  let DPR=1,W=0,H=0;
  let panX=0,panY=0,zoom=1;

  let wmX=0,wmY=0,wmInit=false,draggingWm=false;
  const WM_ASPECT=364/974;
  const wmImgBlk=new Image(),wmImgWht=new Image();
  wmImgBlk.src='img/p78-blk.svg';wmImgWht.src='img/p78-wht.svg';
  let wmTextBlk='',wmTextWht='';
  fetch('img/p78-blk.svg').then(r=>r.text()).then(t=>{wmTextBlk=t;}).catch(()=>{});
  fetch('img/p78-wht.svg').then(r=>r.text()).then(t=>{wmTextWht=t;}).catch(()=>{});

  function fitStage(){
    const pane=viewportEl.getBoundingClientRect(), GAP=22;
    const ar=aspectEl.value.split(':').map(Number), R=ar[0]/ar[1];
    let w=pane.width-2*GAP, h=w/R;
    if(h>pane.height-2*GAP){h=pane.height-2*GAP;w=h*R;}
    stageEl.style.width=Math.max(40,Math.floor(w))+'px';
    stageEl.style.height=Math.max(40,Math.floor(h))+'px';
  }
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2.5);
    if(!document.body.classList.contains('rec')) fitStage();
    const r=canvas.getBoundingClientRect();
    W=Math.max(2,r.width);H=Math.max(2,r.height);
    canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);buildStarfield();
  }
  window.addEventListener('resize',resize);

  // ---------- world / camera ----------
  const A=1, D=6, BODY=0.12;
  function viewParams(){return {SCALE:0.3*H*D/A*zoom, AX:W*0.5+panX, AY:H*0.5+panY};}
  function project(vp,X,Y,Z,persp,roll){
    const cr=Math.cos(roll),sr=Math.sin(roll);
    const Xr=X*cr-Y*sr, Yr=X*sr+Y*cr;
    const depth=D-Z*persp;
    return {x:vp.AX+Xr/depth*vp.SCALE, y:vp.AY-Yr/depth*vp.SCALE, Z, sf:vp.SCALE/depth};
  }
  function hidden(X,Y,Z){const r2=X*X+Y*Y;return r2<BODY*BODY && Z<Math.sqrt(BODY*BODY-r2);}

  function keplerPt(e,inc,Om,w,nu,psi){
    const p=A*(1-e*e)/(1+e*Math.cos(nu));
    let x=p*Math.cos(nu), y=p*Math.sin(nu), z=0, c,s,a1,b1;
    c=Math.cos(w);s=Math.sin(w); a1=x*c-y*s; b1=x*s+y*c; x=a1;y=b1;
    c=Math.cos(inc);s=Math.sin(inc); a1=y*c-z*s; b1=y*s+z*c; y=a1;z=b1;
    c=Math.cos(Om);s=Math.sin(Om); a1=x*c-y*s; b1=x*s+y*c; x=a1;y=b1;
    c=Math.cos(psi);s=Math.sin(psi);
    return {X:x*c+z*s, Y:y, Z:-x*s+z*c};
  }
  function trueAnom(M,e){let E=M;for(let k=0;k<6;k++)E=E-(E-e*Math.sin(E)-M)/(1-e*Math.cos(E));
    return 2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2),Math.sqrt(1-e)*Math.cos(E/2));}

  function elements(k,N){
    const t=N>1?k/(N-1):0.5, u=t-0.5;
    return {
      e:   parseFloat(eccEl.value),
      inc: (t*parseFloat(incsEl.value))*D2R,
      Om:  (u*parseFloat(raansEl.value))*D2R,
      w:   (parseFloat(apodEl.value)+u*parseFloat(aposEl.value))*D2R,
    };
  }

  // ---------- helpers ----------
  function smoother(t){t=Math.min(1,Math.max(0,t));return t*t*t*(t*(t*6-15)+10);}
  function hexRGB(h){h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  const rgba=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;

  let stars=[];
  function buildStarfield(){stars=[];const n=Math.round((W*H)/9000);let seed=51;
    const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
    for(let k=0;k<n;k++)stars.push({x:rnd()*W,y:rnd()*H,r:rnd()*1.1+0.25,a:rnd()*0.5+0.15,par:rnd()*0.5+0.2,tw:rnd()*TWO_PI,sp:rnd()*1.5+0.4});}

  const SEG=150;
  let startT=0,rafId=null;

  function fillBg(){
    if(customBgEl.checked){ctx.fillStyle=bgcolorEl.value;ctx.fillRect(0,0,W,H);return;}
    const th=theme(),top=hexRGB(th.bgTop),bot=hexRGB(th.bgBot);
    let bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,rgba(top,1));bg.addColorStop(1,rgba(bot,1));
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  }
  function background(now){
    fillBg();
    const th=theme();
    if(customBgEl.checked)return;
    if(th.nebula){ctx.save();ctx.globalCompositeOperation='lighter';
      for(const[bx,by,col,al] of [[W*0.7,H*0.35,'#ff6a22',0.10],[W*0.25,H*0.7,'#6f3fa1',0.08]]){
        let n=ctx.createRadialGradient(bx,by,0,bx,by,Math.max(W,H)*0.5);
        n.addColorStop(0,rgba(hexRGB(col),al));n.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=n;ctx.fillRect(0,0,W,H);}
      ctx.restore();}
    if(th.stars&&starsEl.checked){const drift=(now/1000)*8;ctx.save();ctx.globalCompositeOperation='lighter';
      for(const s of stars){const x=((s.x-drift*s.par)%W+W)%W;const tw=0.6+0.4*Math.sin(now/1000*s.sp+s.tw);
        ctx.fillStyle=rgba([220,228,245],s.a*tw);ctx.beginPath();ctx.arc(x,s.y,s.r,0,TWO_PI);ctx.fill();}
      ctx.restore();}
  }

  function drawBody(vp,persp,roll){
    if(!bodyEl.checked||theme().flat)return;
    const p=project(vp,0,0,0,persp,roll);const r=BODY*p.sf;
    let g=ctx.createRadialGradient(p.x-r*0.22,p.y-r*0.22,r*0.1,p.x,p.y,r);
    g.addColorStop(0,rgba([214,214,208],1));g.addColorStop(0.65,rgba([150,150,146],1));g.addColorStop(1,rgba([70,70,68],1));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,r,0,TWO_PI);ctx.fill();
  }

  function strokeOrbit(el,alpha,vp,roll,nuEnd){
    ctx.strokeStyle=rgba(hexRGB(lineHex()),alpha);
    ctx.lineWidth=parseFloat(lwEl.value)*(H/620);ctx.lineCap='round';ctx.lineJoin='round';
    const end=nuEnd!=null?nuEnd:TWO_PI;
    const steps=nuEnd!=null?Math.max(2,Math.ceil(SEG*end/TWO_PI)):SEG;
    const occ=occludeEl.checked;let drawing=false;
    for(let k=0;k<=steps;k++){
      const nu=(k/steps)*end;
      const w=keplerPt(el.e,el.inc,el.Om,el.w,nu,vp.psi);
      const vis=!(occ&&hidden(w.X,w.Y,w.Z));
      const p=project(vp,w.X,w.Y,w.Z,0,roll);
      if(vis){if(!drawing){ctx.beginPath();ctx.moveTo(p.x,p.y);drawing=true;}else ctx.lineTo(p.x,p.y);}
      else if(drawing){ctx.stroke();drawing=false;}
    }
    if(drawing)ctx.stroke();
  }

  function orbitSubpaths(el,vp,roll){
    const occ=occludeEl.checked;const out=[];let cur='';
    for(let k=0;k<=SEG;k++){
      const nu=(k/SEG)*TWO_PI;
      const w=keplerPt(el.e,el.inc,el.Om,el.w,nu,vp.psi);
      const vis=!(occ&&hidden(w.X,w.Y,w.Z));
      const p=project(vp,w.X,w.Y,w.Z,0,roll);
      if(vis){cur+=(cur===''?'M':'L')+p.x.toFixed(2)+' '+p.y.toFixed(2)+' ';}
      else if(cur){out.push(cur.trim());cur='';}
    }
    if(cur)out.push(cur.trim());
    return out;
  }

  function drawSat(el,nu,alpha,vp,persp,roll){
    const th=theme();const w=keplerPt(el.e,el.inc,el.Om,el.w,nu,vp.psi);
    if(occludeEl.checked&&hidden(w.X,w.Y,w.Z))return;
    const p=project(vp,w.X,w.Y,w.Z,persp,roll);
    const glow=hexRGB(th.satGlow),core=hexRGB(th.satCore);
    ctx.save();if(th.glow)ctx.globalCompositeOperation='lighter';
    const R=Math.max(3,0.03*p.sf);
    let gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,R);
    gr.addColorStop(0,rgba(glow,0.45*alpha));gr.addColorStop(0.4,rgba(glow,0.16*alpha));gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(p.x,p.y,R,0,TWO_PI);ctx.fill();ctx.restore();
    ctx.fillStyle=rgba(core,0.9*alpha);ctx.beginPath();ctx.arc(p.x,p.y,Math.max(1,0.006*p.sf),0,TWO_PI);ctx.fill();
  }

  function vignette(){if(customBgEl.checked||theme().flat)return;
    let v=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.72);
    v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,0.45)');ctx.fillStyle=v;ctx.fillRect(0,0,W,H);}

  function wordmarkRect(){const w=(parseFloat(wmSizeEl.value)/100)*W;return {w,h:w*WM_ASPECT};}
  function drawWordmark(){
    if(!wmOnEl.checked)return;
    const img=theme().flat?wmImgBlk:wmImgWht;
    if(!img.complete||!img.naturalWidth)return;
    if(!wmInit){wmX=W/2;wmY=H/2;wmInit=true;}
    const {w,h}=wordmarkRect();
    ctx.drawImage(img,wmX-w/2,wmY-h/2,w,h);
  }

  function orbitWall(globalWall,k,N){
    const s=parseFloat(staggerEl.value);
    if(s<=0||N<=1)return globalWall;
    const start=s*(k/N), span=1-s*((N-1)/N);
    return Math.min(1,Math.max(0,(globalWall-start)/span));
  }

  function frame(now){
    if(!startT)startT=now;
    const dur=parseFloat(durEl.value),N=parseInt(numEl.value,10);
    const roll=parseFloat(rollEl.value)*D2R;
    const vp=viewParams();vp.psi=parseFloat(psiEl.value)*D2R;
    const tsec=(now-startT)/1000;
    const wall=Math.min(tsec/dur,1);

    ctx.setTransform(DPR,0,0,DPR,0,0);
    background(now);
    drawBody(vp,0,roll);

    for(let k=0;k<N;k++){
      const el=elements(k,N);
      const lw=orbitWall(wall,k,N);
      if(lw<=0)continue;
      if(lw<1){
        const nu=trueAnom(TWO_PI*lw,el.e);
        strokeOrbit(el,1,vp,roll,nu);
        if(satEl.checked) drawSat(el,nu,1,vp,0,roll);
      }else{
        strokeOrbit(el,1,vp,roll,null);
        if(satEl.checked&&flyEl.checked){
          const M=(TWO_PI*(tsec/dur))%TWO_PI;
          drawSat(el,trueAnom(M,el.e),1,vp,0,roll);
        }
      }
    }

    vignette();
    drawWordmark();
    if(wall>=1&&loopEl.checked)startT=now;
    rafId=requestAnimationFrame(frame);
  }
  function restart(){startT=0;if(rafId)cancelAnimationFrame(rafId);rafId=requestAnimationFrame(frame);}

  // ---------- export ----------
  function exportDims(){
    const res=parseInt(resEl.value,10)||Math.round(Math.max(W,H));
    const ar=W/H;
    return ar>=1 ? {tw:res, th:Math.round(res/ar)} : {tw:Math.round(res*ar), th:res};
  }
  function drawStatic(transparent){
    const roll=parseFloat(rollEl.value)*D2R;
    const vp=viewParams();vp.psi=parseFloat(psiEl.value)*D2R;
    if(!transparent) fillBg();
    drawBody(vp,0,roll);
    const N=parseInt(numEl.value,10);
    for(let k=0;k<N;k++) strokeOrbit(elements(k,N),1,vp,roll,null);
    drawWordmark();
  }
  function exportPNG(){
    const {tw,th}=exportDims(), transparent=transparentEl.checked;
    const oc=document.createElement('canvas');oc.width=tw;oc.height=th;
    const octx=oc.getContext('2d');
    const sav={ctx,W,H,DPR,panX,panY,wmX,wmY};
    const f=th/H;
    ctx=octx;DPR=1;W=tw;H=th;panX*=f;panY*=f;wmX*=f;wmY*=f;
    ctx.setTransform(1,0,0,1,0,0);
    drawStatic(transparent);
    const data=oc.toDataURL('image/png');
    ctx=sav.ctx;W=sav.W;H=sav.H;DPR=sav.DPR;panX=sav.panX;panY=sav.panY;wmX=sav.wmX;wmY=sav.wmY;
    download(data,'p78-orbit.png');
  }
  function exportSVG(){
    const N=parseInt(numEl.value,10), roll=parseFloat(rollEl.value)*D2R, th=theme(), transparent=transparentEl.checked;
    const vp=viewParams(); vp.psi=parseFloat(psiEl.value)*D2R;
    const lwpx=(parseFloat(lwEl.value)*(H/620)).toFixed(2);
    let groups='';
    for(let k=0;k<N;k++){
      let d='';for(const sp of orbitSubpaths(elements(k,N),vp,roll)) d+=`<path d="${sp}"/>`;
      groups+=`<g id="orbit-${k+1}">${d}</g>`;
    }
    let body='';
    if(bodyEl.checked&&!th.flat){const p=project(vp,0,0,0,0,roll);
      body=`<circle id="body" cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="${(BODY*p.sf).toFixed(2)}" fill="#9a9a96"/>`;}
    let wm='';
    if(wmOnEl.checked){const txt=th.flat?wmTextBlk:wmTextWht;
      if(txt){const {w,h}=wordmarkRect();const b64=btoa(unescape(encodeURIComponent(txt)));
        wm=`<image id="wordmark" x="${(wmX-w/2).toFixed(2)}" y="${(wmY-h/2).toFixed(2)}" width="${w.toFixed(2)}" height="${h.toFixed(2)}" href="data:image/svg+xml;base64,${b64}"/>`;}}
    const Wi=Math.round(W),Hi=Math.round(H),dm=exportDims();
    const bg=transparent?'':`<rect width="${Wi}" height="${Hi}" fill="${customBgEl.checked?bgcolorEl.value:th.bgBot}"/>`;
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${Wi} ${Hi}" width="${dm.tw}" height="${dm.th}">`
      +bg+`<g id="orbits" fill="none" stroke="${lineHex()}" stroke-width="${lwpx}" stroke-linecap="round" stroke-linejoin="round">${groups}</g>`
      +body+wm+`</svg>`;
    const url=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
    download(url,'p78-orbit.svg');setTimeout(()=>URL.revokeObjectURL(url),1500);
  }
  function download(href,name){const a=document.createElement('a');a.href=href;a.download=name;a.click();}

  // ---------- state: presets + share ----------
  function getState(){
    const s={r:{},c:{}};
    RANGE.forEach(c=>s.r[c.id]=$(c.id).value);
    CHECKS.forEach(id=>s.c[id]=$(id).checked?1:0);
    s.theme=themeKey;s.bg=bgcolorEl.value;s.line=linecolorEl.value;s.aspect=aspectEl.value;
    s.pan=[Math.round(panX),Math.round(panY)];s.zoom=+zoom.toFixed(3);
    s.wmp=[Math.round(wmX),Math.round(wmY)];s.wmi=wmInit?1:0;
    return s;
  }
  function setState(s){
    if(!s)return;
    if(s.r)RANGE.forEach(c=>{if(s.r[c.id]!=null)setRange(c.id,s.r[c.id]);});
    if(s.c)CHECKS.forEach(id=>{if(s.c[id]!=null)$(id).checked=!!s.c[id];});
    if(s.theme&&THEMES[s.theme]){themeKey=s.theme;updateThemeBtn();}
    if(s.bg)bgcolorEl.value=s.bg;
    if(s.line)linecolorEl.value=s.line;
    if(s.aspect){aspectEl.value=s.aspect;}
    if(s.zoom!=null)setRange('scale',s.zoom);
    if(s.pan){panX=+s.pan[0];panY=+s.pan[1];}
    if(s.wmp){wmX=+s.wmp[0];wmY=+s.wmp[1];}
    if(s.wmi!=null)wmInit=!!s.wmi;
    resize();restart();
  }
  const enc=o=>btoa(unescape(encodeURIComponent(JSON.stringify(o))));
  const dec=s=>JSON.parse(decodeURIComponent(escape(atob(s))));
  function shareURL(){return location.origin+location.pathname+'#p='+enc(getState());}
  function loadFromHash(){try{const m=location.hash.match(/p=([^&]+)/);if(m){setState(dec(m[1]));return true;}}catch(e){}return false;}

  const PKEY='p78-presets';
  function loadPresets(){try{return JSON.parse(localStorage.getItem(PKEY)||'{}');}catch(e){return {};}}
  function savePresets(o){localStorage.setItem(PKEY,JSON.stringify(o));}
  function refreshPresetList(){const o=loadPresets();
    $('psel').innerHTML='<option value="">— load preset —</option>'+Object.keys(o).map(n=>`<option>${n.replace(/</g,'')}</option>`).join('');}

  // ---------- UI wiring ----------
  function updateThemeBtn(){$('theme').textContent="Theme: "+THEMES[themeKey].label;}
  $('theme').onclick=()=>{themeKey=THEME_ORDER[(THEME_ORDER.indexOf(themeKey)+1)%THEME_ORDER.length];updateThemeBtn();};
  $('replay').onclick=restart;
  aspectEl.onchange=()=>resize();

  function syncScale(){setRange('scale',+zoom.toFixed(2));}
  $('resetview').onclick=()=>{panX=0;panY=0;zoom=1;syncScale();};
  let dragging=false,lastX=0,lastY=0;
  canvas.style.cursor='grab';
  function hitWm(mx,my){if(!wmOnEl.checked||!wmInit)return false;const {w,h}=wordmarkRect();return Math.abs(mx-wmX)<=w/2&&Math.abs(my-wmY)<=h/2;}
  canvas.addEventListener('pointerdown',e=>{
    const rect=canvas.getBoundingClientRect();
    if(hitWm(e.clientX-rect.left,e.clientY-rect.top))draggingWm=true;else dragging=true;
    lastX=e.clientX;lastY=e.clientY;canvas.style.cursor='grabbing';canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove',e=>{
    const dx=e.clientX-lastX,dy=e.clientY-lastY;
    if(draggingWm){wmX+=dx;wmY+=dy;}else if(dragging){panX+=dx;panY+=dy;}else return;
    lastX=e.clientX;lastY=e.clientY;
  });
  const endDrag=()=>{dragging=false;draggingWm=false;canvas.style.cursor='grab';};
  canvas.addEventListener('pointerup',endDrag);canvas.addEventListener('pointercancel',endDrag);
  canvas.addEventListener('wheel',e=>{e.preventDefault();
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top, sx=W*0.5+panX, sy=H*0.5+panY;
    const nz=Math.min(5,Math.max(0.2,zoom*Math.exp(-e.deltaY*0.0015))), r=nz/zoom; zoom=nz;
    panX=(mx+(sx-mx)*r)-W*0.5; panY=(my+(sy-my)*r)-H*0.5;
    syncScale();
  },{passive:false});

  function lockup(pos){
    wmOnEl.checked=true;
    const cx=W/2+panX, cy=H/2+panY, mr=0.34*H*zoom, {h}=wordmarkRect(), clear=0.05*H;
    if(pos==='below'){wmX=cx;wmY=cy+mr+clear;}
    else if(pos==='above'){wmX=cx;wmY=cy-mr-clear;}
    else if(pos==='right'){wmX=cx+mr+clear;wmY=cy;}
    else {wmX=cx;wmY=cy;}
    wmInit=true;
  }
  $('lk-free').onclick=()=>lockup('free');
  $('lk-below').onclick=()=>lockup('below');
  $('lk-right').onclick=()=>lockup('right');
  $('lk-above').onclick=()=>lockup('above');

  $('export').onclick=exportPNG;
  $('exportsvg').onclick=exportSVG;

  $('psave').onclick=()=>{const n=$('pname').value.trim();if(!n)return;const o=loadPresets();o[n]=getState();savePresets(o);refreshPresetList();$('psel').value=n;};
  $('psel').onchange=()=>{const n=$('psel').value;if(n){const o=loadPresets();if(o[n])setState(o[n]);}};
  $('pdel').onclick=()=>{const n=$('psel').value;if(!n)return;const o=loadPresets();delete o[n];savePresets(o);refreshPresetList();};
  $('copylink').onclick=()=>{const u=shareURL();history.replaceState(null,'',u);
    const done=()=>{const b=$('copylink');const t=b.textContent;b.textContent='✓ Copied';setTimeout(()=>b.textContent=t,1200);};
    if(navigator.clipboard)navigator.clipboard.writeText(u).then(done).catch(()=>window.prompt('Copy link:',u));
    else window.prompt('Copy link:',u);};

  const recBtn=$('rec'),recExit=$('rec-exit');
  const toggleRec=on=>{document.body.classList.toggle('rec',on);requestAnimationFrame(resize);};
  recBtn.onclick=()=>toggleRec(true);recExit.onclick=()=>toggleRec(false);
  window.addEventListener('keydown',e=>{if(e.key==='Escape')toggleRec(false);});

  // ---------- go ----------
  updateThemeBtn();refreshPresetList();
  resize();
  if(!loadFromHash())restart();
})();
</script>
</body>
</html>
