<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P78 — Orbital Logo (3D)</title>
<style>
  :root{--orange:#ff5500;--black:#141615;--ink:#e7e9e3;--panel:#11141a;--line:#222833;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:#06080d;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:flex;flex-direction:column;align-items:center;padding:28px 20px 40px;min-height:100vh;}
  h1{font-weight:500;font-size:16px;letter-spacing:.02em;margin:0 0 2px}
  .sub{font-size:12px;opacity:.45;margin-bottom:18px}
  .stage{position:relative;width:100%;max-width:900px;aspect-ratio:16/10;
    border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#000;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .chrome{width:100%;max-width:900px}
  .presets{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 4px}
  .presets button{background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:inherit;transition:.15s;}
  .presets button:hover{border-color:#3a4556}
  .presets button.active{background:var(--orange);color:#1a0f06;border-color:var(--orange);font-weight:600}
  .controls{display:grid;grid-template-columns:1fr 1fr;gap:14px 24px;margin-top:14px;font-size:12px}
  .control{display:flex;flex-direction:column;gap:6px}
  .control label{opacity:.7;display:flex;justify-content:space-between}
  .control .v{color:#ff9a5c;font-variant-numeric:tabular-nums;font-weight:600}
  input[type=range]{width:100%;accent-color:var(--orange)}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-top:16px;font-size:12px}
  .row button{background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit;}
  .row button:hover{border-color:#3a4556}
  .row label{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.8}
  .spacer{flex:1}
  .hint{font-size:11px;opacity:.4;margin-top:14px;text-align:center}
  body.rec{padding:0;justify-content:center;background:#000}
  body.rec .chrome,body.rec h1,body.rec .sub{display:none}
  body.rec .stage{position:fixed;inset:0;max-width:none;width:100vw;height:100vh;aspect-ratio:auto;border:none;border-radius:0}
  .rec-exit{position:fixed;top:14px;right:16px;z-index:10;display:none;background:rgba(0,0,0,.4);color:#fff;
    border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 12px;font-size:11px;cursor:pointer;backdrop-filter:blur(6px)}
  body.rec .rec-exit{display:block}
</style>
</head>
<body>
  <h1>P78 — Orbital Logo (3D)</h1>
  <div class="sub">A satellite's orbital plane rotates in real 3D about the pinned axis — perspective eases flat into the mark.</div>

  <div class="stage" id="stage"><canvas id="c"></canvas></div>
  <button class="rec-exit" id="rec-exit">Exit recording (Esc)</button>

  <div class="chrome">
    <div class="presets" id="presets"></div>
    <div class="controls">
      <div class="control"><label>Build duration <span class="v" id="dur-v">12s</span></label>
        <input type="range" id="dur" min="5" max="24" step="0.5" value="12"></div>
      <div class="control"><label>Number of orbits <span class="v" id="orb-v">6</span></label>
        <input type="range" id="orb" min="3" max="48" value="6"></div>
      <div class="control"><label>Perspective <span class="v" id="persp-v">0%</span></label>
        <input type="range" id="persp" min="0" max="100" value="0"></div>
    </div>
    <div class="row">
      <button id="replay">↻ Replay</button>
      <label><input type="checkbox" id="loop"> Loop</label>
      <label><input type="checkbox" id="sat" checked> Satellite</label>
      <label><input type="checkbox" id="planet" checked> Planet</label>
      <label><input type="checkbox" id="stars"> Starfield</label>
      <div class="spacer"></div>
      <button id="rec">⤢ Recording mode</button>
    </div>
    <div class="hint">Pick a style · the orbit ring genuinely rotates in 3D about the right-edge axis · perspective flattens into the exact logo.</div>
  </div>

<script>
(function(){
  "use strict";
  const TWO_PI=Math.PI*2;

  // ---------- styles ----------
  const THEMES={
    spaceBrand:{label:"Space → Brand",bgTop:"#0c1120",bgBot:"#05070e",line:"#ff7a33",accent:"#d5ff5a",
      satGlow:"#ff7a1f",satCore:"#fff6ec",stars:true,nebula:true,glow:true,flat:false,
      resolve:true,brandBg:"#ff5500",brandLine:"#141615"},
    whiteBlack:{label:"White on Black",bgTop:"#0d0f12",bgBot:"#000000",line:"#eef0ea",accent:"#d5ff5a",
      satGlow:"#cfe0ff",satCore:"#ffffff",stars:true,nebula:false,glow:true,flat:false,resolve:false},
    orangeBlack:{label:"Orange on Black",bgTop:"#16100b",bgBot:"#050403",line:"#ff6a22",accent:"#d5ff5a",
      satGlow:"#ff6a22",satCore:"#fff1e4",stars:true,nebula:true,glow:true,flat:false,resolve:false},
    brandFlat:{label:"Brand Flat",bgTop:"#ff5500",bgBot:"#ff5500",line:"#141615",accent:"#141615",
      satGlow:"#141615",satCore:"#141615",stars:false,nebula:false,glow:false,flat:true,resolve:false},
  };
  let themeKey="whiteBlack";
  const theme=()=>THEMES[themeKey];

  // ---------- canvas ----------
  const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
  let DPR=1,W=0,H=0;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2.5);
    const r=canvas.getBoundingClientRect();
    W=Math.max(2,r.width);H=Math.max(2,r.height);
    canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    buildStarfield();
  }
  window.addEventListener('resize',resize);

  // ---------- camera / projection ----------
  // World units with orbit radius R = 1. Rotation axis is the vertical line through
  // the orbit's right-edge (world origin). Camera sits on +Z looking toward -Z.
  const CAMZ=9;                 // larger ⇒ gentler perspective. 9 ⇒ subtle & elegant.
  function viewParams(){
    const SCALE=0.3*H*CAMZ;             // full-circle diameter ≈ 0.6·H
    const ANCHOR_X=W*0.5+0.3*H;         // pin sits right-of-centre so fan centres
    const ANCHOR_Y=H*0.5;
    return {SCALE,ANCHOR_X,ANCHOR_Y};
  }
  // persp: 1 = full perspective, 0 = orthographic (clean flat logo)
  function project(vp,X,Y,Z,persp){
    const depth=CAMZ - Z*persp;         // persp→0 ⇒ constant divisor (ortho)
    const sf=vp.SCALE/depth;
    return {x:vp.ANCHOR_X+X/depth*vp.SCALE, y:vp.ANCHOR_Y - Y/depth*vp.SCALE, Z, sf};
  }
  // a point on the ring (radius 1) whose right edge is pinned at the origin,
  // the whole ring rotated by Ω about the vertical (Y) axis.
  function ringPt(Om,phi){
    const base=-1+Math.cos(phi);        // x before rotation, ∈ [-2,0]
    return {X:base*Math.cos(Om), Y:Math.sin(phi), Z:-base*Math.sin(Om)};
  }
  function planetPt(Om){return {X:-Math.cos(Om),Y:0,Z:Math.sin(Om)};}

  // Ω schedule: edge-on (slit) → face-on (circle); acos bunches the slits like the mark
  const omegaOf=s=>Math.acos(Math.min(1,Math.max(0,s)));

  // ---------- helpers ----------
  const lerp=(a,b,t)=>a+(b-a)*t;
  function smoother(t){t=Math.min(1,Math.max(0,t));return t*t*t*(t*(t*6-15)+10);}
  function hexRGB(h){h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function mix(h1,h2,t){const a=hexRGB(h1),b=hexRGB(h2);return[Math.round(lerp(a[0],b[0],t)),Math.round(lerp(a[1],b[1],t)),Math.round(lerp(a[2],b[2],t))];}
  const rgba=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;

  // ---------- starfield ----------
  let stars=[];
  function buildStarfield(){
    stars=[];const n=Math.round((W*H)/9000);let seed=2099;
    const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
    for(let i=0;i<n;i++)stars.push({x:rnd()*W,y:rnd()*H,r:rnd()*1.1+0.25,a:rnd()*0.5+0.15,par:rnd()*0.5+0.2,tw:rnd()*TWO_PI,sp:rnd()*1.5+0.4});
  }

  // ---------- timeline ----------
  const SEG=92,RESOLVE_START=0.84;
  let startT=0,rafId=null,trail=[];

  function background(vp,resolveAmt,now){
    const th=theme();
    const top=th.resolve?mix(th.bgTop,th.brandBg,resolveAmt):hexRGB(th.bgTop);
    const bot=th.resolve?mix(th.bgBot,th.brandBg,resolveAmt):hexRGB(th.bgBot);
    let bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,rgba(top,1));bg.addColorStop(1,rgba(bot,1));
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    const dim=1-resolveAmt;
    if(th.nebula&&dim>0.01){
      ctx.save();ctx.globalCompositeOperation='lighter';
      for(const[bx,by,col,al] of [[W*0.7,H*0.35,'#ff6a22',0.10],[W*0.25,H*0.7,'#6f3fa1',0.08]]){
        let n=ctx.createRadialGradient(bx,by,0,bx,by,Math.max(W,H)*0.5);
        n.addColorStop(0,rgba(hexRGB(col),al*dim));n.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=n;ctx.fillRect(0,0,W,H);}
      ctx.restore();
    }
    if(th.stars&&starsEl.checked&&dim>0.01){
      const drift=(now/1000)*8;ctx.save();ctx.globalCompositeOperation='lighter';
      for(const s of stars){const x=((s.x-drift*s.par)%W+W)%W;const tw=0.6+0.4*Math.sin(now/1000*s.sp+s.tw);
        ctx.fillStyle=rgba([220,228,245],s.a*tw*dim);ctx.beginPath();ctx.arc(x,s.y,s.r,0,TWO_PI);ctx.fill();}
      ctx.restore();
    }
  }

  // stroke a ring (full, or partial up to phiEnd) as one solid, uniform line
  function strokeRing(vp,Om,depositA,resolveAmt,persp,phiEnd){
    const th=theme();
    const line=th.resolve?mix(th.line,th.brandLine,resolveAmt):hexRGB(th.line);
    const end=phiEnd!=null?phiEnd:TWO_PI;
    const steps=phiEnd!=null?Math.max(2,Math.ceil(SEG*end/TWO_PI)):SEG;
    ctx.lineWidth=1.7*(H/620);
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.strokeStyle=rgba(line,depositA);
    const p0=project(vp,...Object.values(ringPt(Om,0)),persp);
    ctx.beginPath();ctx.moveTo(p0.x,p0.y);
    for(let i=1;i<=steps;i++){
      const w3=ringPt(Om,(i/steps)*end);
      const p=project(vp,w3.X,w3.Y,w3.Z,persp);
      ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
  }

  function drawPlanet(vp,Om,resolveAmt,persp){
    if(!planetEl.checked)return;
    const a=(1-resolveAmt)*(theme().flat?0:1);if(a<=0.01)return;
    const w=planetPt(Om);const p=project(vp,w.X,w.Y,w.Z,persp);
    const r=Math.max(5,0.095*p.sf);
    ctx.fillStyle=rgba([231,233,227],a);          // solid, small
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,TWO_PI);ctx.fill();
    return {p,r};
  }

  function drawSatellite(vp,p,resolveAmt){
    const th=theme();const a=1-resolveAmt;if(a<=0.02)return;
    const glow=hexRGB(th.satGlow),core=hexRGB(th.satCore);
    ctx.save();if(th.glow)ctx.globalCompositeOperation='lighter';
    const R=Math.max(4,0.037*p.sf);
    let gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,R);
    gr.addColorStop(0,rgba(glow,0.45*a));gr.addColorStop(0.4,rgba(glow,0.16*a));gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(p.x,p.y,R,0,TWO_PI);ctx.fill();ctx.restore();
    ctx.fillStyle=rgba(core,0.85*a);ctx.beginPath();ctx.arc(p.x,p.y,Math.max(1,0.007*p.sf),0,TWO_PI);ctx.fill();
  }

  function vignette(){
    let v=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.72);
    v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,0.45)');ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
  }

  function frame(now){
    if(!startT)startT=now;
    const dur=parseFloat(durEl.value),num=parseInt(orbEl.value,10);
    const vp=viewParams();
    const wall=Math.min((now-startT)/(dur*1000),1);
    const s=smoother(wall);
    // Paint-once mode: no end merge. persp 0 = orthographic (constant altitude = the mark).
    const resolveAmt=0;
    const persp=parseFloat(perspEl.value)/100;

    const prog=num*s;                 // revolutions completed (fractional)
    const full=Math.floor(prog);
    const partial=prog-full;
    // The loop currently being painted holds ONE fixed orientation for its whole
    // revolution, so the line is drawn exactly where it will stay forever.
    const kActive=Math.min(full+1,num);
    const OmActive=omegaOf(kActive/num);
    const OmSmooth=omegaOf(s);          // planet glides continuously through the centres
    const phiNow=partial*TWO_PI;

    ctx.setTransform(DPR,0,0,DPR,0,0);
    background(vp,resolveAmt,now);

    // completed orbits — already painted, identical every frame (permanent)
    for(let k=1;k<=full;k++){
      strokeRing(vp,omegaOf(k/num),1,resolveAmt,persp,null);
    }
    // satellite position + occlusion vs planet (all on the active loop's fixed ring)
    const w3=ringPt(OmActive,phiNow);
    const sat=project(vp,w3.X,w3.Y,w3.Z,persp);
    const planetW=planetPt(OmSmooth);
    const planetProj=project(vp,planetW.X,planetW.Y,planetW.Z,persp);
    const satBehind=sat.Z<planetProj.Z;

    if(wall<1||loopEl.checked){
      if(satBehind&&satEl.checked)drawSatellite(vp,sat,resolveAmt);
      drawPlanet(vp,OmSmooth,resolveAmt,persp);
      strokeRing(vp,OmActive,1,resolveAmt,persp,phiNow);   // active arc, fixed angle
      if(!satBehind&&satEl.checked)drawSatellite(vp,sat,resolveAmt);
    }

    vignette();

    if(wall>=1&&loopEl.checked){startT=now;}
    rafId=requestAnimationFrame(frame);
  }

  function restart(){startT=0;trail=[];if(rafId)cancelAnimationFrame(rafId);rafId=requestAnimationFrame(frame);}

  // ---------- UI ----------
  const durEl=document.getElementById('dur'),orbEl=document.getElementById('orb');
  const durV=document.getElementById('dur-v'),orbV=document.getElementById('orb-v');
  const loopEl=document.getElementById('loop'),planetEl=document.getElementById('planet'),starsEl=document.getElementById('stars'),satEl=document.getElementById('sat');
  const perspEl=document.getElementById('persp'),perspV=document.getElementById('persp-v');
  perspEl.oninput=()=>{perspV.textContent=perspEl.value+'%';};
  const presetsEl=document.getElementById('presets');
  Object.keys(THEMES).forEach(k=>{const b=document.createElement('button');b.textContent=THEMES[k].label;b.dataset.k=k;
    if(k===themeKey)b.classList.add('active');
    b.onclick=()=>{themeKey=k;[...presetsEl.children].forEach(c=>c.classList.toggle('active',c.dataset.k===k));};
    presetsEl.appendChild(b);});
  durEl.oninput=()=>{durV.textContent=durEl.value+'s';restart();};
  orbEl.oninput=()=>{orbV.textContent=orbEl.value;restart();};
  document.getElementById('replay').onclick=restart;
  const recBtn=document.getElementById('rec'),recExit=document.getElementById('rec-exit');
  const toggleRec=on=>{document.body.classList.toggle('rec',on);requestAnimationFrame(resize);};
  recBtn.onclick=()=>toggleRec(true);recExit.onclick=()=>toggleRec(false);
  window.addEventListener('keydown',e=>{if(e.key==='Escape')toggleRec(false);});

  durV.textContent=durEl.value+'s';orbV.textContent=orbEl.value;
  resize();restart();
})();
</script>
</body>
</html>
