<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P78 — Orbital Logo (Pro)</title>
<style>
  :root{
    --orange:#ff5500;
    --black:#141615;
    --ink:#e7e9e3;
    --panel:#11141a;
    --line:#222833;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:#06080d;
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:flex;flex-direction:column;align-items:center;
    padding:28px 20px 40px;min-height:100vh;
  }
  h1{font-weight:500;font-size:16px;letter-spacing:.02em;margin:0 0 2px}
  .sub{font-size:12px;opacity:.45;margin-bottom:18px}

  .stage{
    position:relative;width:100%;max-width:900px;aspect-ratio:16/10;
    border-radius:14px;overflow:hidden;border:1px solid var(--line);
    background:#000;
  }
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

  .chrome{width:100%;max-width:900px}
  .presets{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 4px}
  .presets button{
    background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;
    font-family:inherit;transition:.15s;
  }
  .presets button:hover{border-color:#3a4556}
  .presets button.active{background:var(--orange);color:#1a0f06;border-color:var(--orange);font-weight:600}

  .controls{
    display:grid;grid-template-columns:1fr 1fr;gap:14px 24px;
    margin-top:14px;font-size:12px;
  }
  .control{display:flex;flex-direction:column;gap:6px}
  .control label{opacity:.7;display:flex;justify-content:space-between}
  .control .v{color:#ff9a5c;font-variant-numeric:tabular-nums;font-weight:600}
  input[type=range]{width:100%;accent-color:var(--orange)}

  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-top:16px;font-size:12px}
  .row button{
    background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit;
  }
  .row button:hover{border-color:#3a4556}
  .row label{display:flex;align-items:center;gap:6px;cursor:pointer;opacity:.8}
  .spacer{flex:1}
  .hint{font-size:11px;opacity:.4;margin-top:14px;text-align:center}

  /* Recording mode: hide all UI, fill the viewport */
  body.rec{padding:0;justify-content:center;background:#000}
  body.rec .chrome,body.rec h1,body.rec .sub{display:none}
  body.rec .stage{
    position:fixed;inset:0;max-width:none;width:100vw;height:100vh;
    aspect-ratio:auto;border:none;border-radius:0;
  }
  .rec-exit{position:fixed;top:14px;right:16px;z-index:10;display:none;
    background:rgba(0,0,0,.4);color:#fff;border:1px solid rgba(255,255,255,.25);
    border-radius:8px;padding:7px 12px;font-size:11px;cursor:pointer;backdrop-filter:blur(6px)}
  body.rec .rec-exit{display:block}
</style>
</head>
<body>
  <h1>P78 — Orbital Logo</h1>
  <div class="sub">A satellite draws the mark: precessing orbits, pinned at the right edge, resolving into the logo.</div>

  <div class="stage" id="stage">
    <canvas id="c"></canvas>
  </div>
  <button class="rec-exit" id="rec-exit">Exit recording (Esc)</button>

  <div class="chrome">
    <div class="presets" id="presets"></div>

    <div class="controls">
      <div class="control">
        <label>Build duration <span class="v" id="dur-v">11s</span></label>
        <input type="range" id="dur" min="5" max="22" step="0.5" value="11">
      </div>
      <div class="control">
        <label>Number of orbits <span class="v" id="orb-v">26</span></label>
        <input type="range" id="orb" min="8" max="48" value="26">
      </div>
    </div>

    <div class="row">
      <button id="replay">↻ Replay</button>
      <label><input type="checkbox" id="loop"> Loop</label>
      <label><input type="checkbox" id="planet" checked> Planet</label>
      <label><input type="checkbox" id="stars" checked> Starfield</label>
      <div class="spacer"></div>
      <button id="rec">⤢ Recording mode</button>
    </div>

    <div class="hint">Pick a style above · drag sliders to retime · “Recording mode” hides the UI for a clean capture.</div>
  </div>

<script>
(function(){
  "use strict";

  // ---------- constants (the orbital math is preserved from the original) ----------
  const RAAN_MAX = 88 * Math.PI/180;     // stop shy of 90° (RAAN rate → ∞ at 90°)
  const TWO_PI = Math.PI*2;

  // ---------- styles ----------
  // Each theme defines the "build" look and (optionally) a brand "resolve" target.
  const THEMES = {
    spaceBrand:{
      label:"Space → Brand",
      bgTop:"#0c1120", bgBot:"#05070e",
      line:"#ff7a33", accent:"#d5ff5a",
      satGlow:"#ff7a1f", satCore:"#fff6ec",
      stars:true, nebula:true, glow:true, flat:false,
      resolve:true, brandBg:"#ff5500", brandLine:"#141615",
    },
    whiteBlack:{
      label:"White on Black",
      bgTop:"#0d0f12", bgBot:"#000000",
      line:"#eef0ea", accent:"#d5ff5a",
      satGlow:"#cfe0ff", satCore:"#ffffff",
      stars:true, nebula:false, glow:true, flat:false,
      resolve:false,
    },
    orangeBlack:{
      label:"Orange on Black",
      bgTop:"#16100b", bgBot:"#050403",
      line:"#ff6a22", accent:"#d5ff5a",
      satGlow:"#ff6a22", satCore:"#fff1e4",
      stars:true, nebula:true, glow:true, flat:false,
      resolve:false,
    },
    brandFlat:{
      label:"Brand Flat",
      bgTop:"#ff5500", bgBot:"#ff5500",
      line:"#141615", accent:"#141615",
      satGlow:"#141615", satCore:"#141615",
      stars:false, nebula:false, glow:false, flat:true,
      resolve:false,
    },
  };
  let themeKey = "spaceBrand";
  const theme = () => THEMES[themeKey];

  // ---------- canvas / DPR ----------
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const trace = document.createElement('canvas');   // offscreen: settled traces
  const tctx = trace.getContext('2d');
  let DPR=1, W=0, H=0;

  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2.5);
    const r = canvas.getBoundingClientRect();
    W = Math.max(2, r.width); H = Math.max(2, r.height);
    canvas.width = Math.round(W*DPR); canvas.height = Math.round(H*DPR);
    trace.width = canvas.width; trace.height = canvas.height;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    tctx.setTransform(DPR,0,0,DPR,0,0);
    settledCount = -1;        // force trace re-render
    buildStarfield();
  }
  window.addEventListener('resize', resize);

  // ---------- geometry (derived from current size; fully responsive) ----------
  function geom(){
    const R = H*0.27;
    const X_ANCHOR = W*0.5 + R;        // centers the finished mark horizontally
    const cy = H*0.5;
    const dur = parseFloat(durEl.value);
    const num = parseInt(orbEl.value,10);
    const v_p = R*Math.sin(RAAN_MAX)/dur;     // planet speed so RAAN→max at t=dur
    return {R,X_ANCHOR,cy,dur,num,v_p,period:dur/num,rPlanet:Math.max(7,H*0.022)};
  }
  const planetX = (g,t)=> g.X_ANCHOR - g.v_p*t;
  const raanAt  = (g,t)=> Math.asin(Math.min(1,Math.max(-1, g.v_p*t/g.R)));

  // 3D point of the orbit, projected. z>0 = toward viewer (front).
  function pt(g, cx, raan, theta){
    const sR=Math.sin(raan), cR=Math.cos(raan);
    const x = g.R*Math.sin(theta)*sR;
    const y = g.R*Math.cos(theta);
    const z = g.R*Math.sin(theta)*cR;
    return {x:cx+x, y:g.cy-y, z};
  }

  // ---------- helpers ----------
  const lerp=(a,b,t)=>a+(b-a)*t;
  function smoother(t){t=Math.min(1,Math.max(0,t));return t*t*t*(t*(t*6-15)+10);}
  function hexRGB(h){h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function mix(h1,h2,t){const a=hexRGB(h1),b=hexRGB(h2);return[Math.round(lerp(a[0],b[0],t)),Math.round(lerp(a[1],b[1],t)),Math.round(lerp(a[2],b[2],t))];}
  const rgba=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;

  // ---------- starfield ----------
  let stars=[];
  function buildStarfield(){
    stars=[];
    const n=Math.round((W*H)/9000);
    let seed=1337;
    const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
    for(let i=0;i<n;i++){
      stars.push({x:rnd()*W,y:rnd()*H,r:rnd()*1.1+0.25,
        a:rnd()*0.5+0.15,par:rnd()*0.5+0.2,tw:rnd()*TWO_PI,sp:rnd()*1.5+0.4});
    }
  }

  // ---------- timeline ----------
  const SEG=84;                 // segments per orbit
  const RESOLVE_START=0.84;     // when the brand resolve begins (fraction of build)
  let startT=0, rafId=null, settledCount=-1, sig="";
  let trail=[];

  function paramSig(g){return `${themeKey}|${g.num}|${Math.round(W)}x${Math.round(H)}|${starsEl.checked}|${planetEl.checked}`;}

  // draw one orbit's polyline with depth shading onto a given context
  function strokeOrbit(c, g, cx, raan, depositA, resolveAmt, partialTheta){
    const th=theme();
    const line = th.resolve ? mix(th.line, th.brandLine, resolveAmt) : hexRGB(th.line);
    const flat = Math.max(th.flat?1:0, resolveAmt);
    const wScale = H/620;
    const end = partialTheta!=null ? partialTheta : TWO_PI;
    const steps = partialTheta!=null ? Math.max(2,Math.ceil(SEG*(end/TWO_PI))) : SEG;
    let prev=pt(g,cx,raan,0);
    for(let i=1;i<=steps;i++){
      const theta=(i/steps)*end;
      const p=pt(g,cx,raan,theta);
      const zmid=(p.z+prev.z)/2;
      const depth=(zmid+g.R)/(2*g.R);              // 0 back … 1 front
      const dA=lerp(0.22+0.66*depth, 1, flat);     // resolve → uniform
      const w =lerp((0.8+1.0*depth), 1.5, flat)*wScale;
      c.lineCap='round';
      c.lineWidth=w;
      c.strokeStyle=rgba(line, dA*depositA);
      c.beginPath();c.moveTo(prev.x,prev.y);c.lineTo(p.x,p.y);c.stroke();
      prev=p;
    }
  }

  // re-render settled traces (orbits 1..count-1) to the offscreen canvas
  function renderTraces(g, count, resolveAmt){
    tctx.setTransform(DPR,0,0,DPR,0,0);
    tctx.clearRect(0,0,W,H);
    for(let i=1;i<count;i++){
      const t_i=i*g.period;
      strokeOrbit(tctx, g, planetX(g,t_i), raanAt(g,t_i), 1, resolveAmt, null);
    }
  }

  function drawPlanet(g, px, resolveAmt){
    if(!planetEl.checked) return;
    const a=(1-resolveAmt)*(theme().flat?0:1);
    if(a<=0.01) return;
    const r=g.rPlanet;
    // soft halo
    let halo=ctx.createRadialGradient(px,g.cy,r*0.4,px,g.cy,r*2.6);
    halo.addColorStop(0,rgba([120,150,210],0.22*a));
    halo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=halo;ctx.beginPath();ctx.arc(px,g.cy,r*2.6,0,TWO_PI);ctx.fill();
    // sphere with terminator
    let sph=ctx.createRadialGradient(px-r*0.4,g.cy-r*0.45,r*0.1,px,g.cy,r);
    sph.addColorStop(0,rgba([235,238,246],0.95*a));
    sph.addColorStop(0.55,rgba([150,165,195],0.9*a));
    sph.addColorStop(1,rgba([40,52,78],0.95*a));
    ctx.fillStyle=sph;ctx.beginPath();ctx.arc(px,g.cy,r,0,TWO_PI);ctx.fill();
    // rim light
    ctx.strokeStyle=rgba([200,215,255],0.35*a);ctx.lineWidth=0.8;
    ctx.beginPath();ctx.arc(px,g.cy,r,-2.4,-0.4);ctx.stroke();
  }

  function drawSatellite(g, p, resolveAmt){
    const th=theme();
    const a=(1-resolveAmt);
    if(a<=0.02) return;
    const glow=hexRGB(th.satGlow), core=hexRGB(th.satCore);
    ctx.save();
    if(th.glow) ctx.globalCompositeOperation='lighter';
    // motion streak
    if(trail.length>1){
      for(let i=1;i<trail.length;i++){
        const f=i/trail.length;
        ctx.strokeStyle=rgba(glow, 0.12*f*a);
        ctx.lineWidth=(1+3*f)*(H/620);ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(trail[i-1].x,trail[i-1].y);ctx.lineTo(trail[i].x,trail[i].y);ctx.stroke();
      }
    }
    // bloom
    const R=g.rPlanet;
    let gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,R*1.8);
    gr.addColorStop(0,rgba(glow,0.9*a));
    gr.addColorStop(0.4,rgba(glow,0.35*a));
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(p.x,p.y,R*1.8,0,TWO_PI);ctx.fill();
    ctx.restore();
    // core
    ctx.fillStyle=rgba(core,a);
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(2.2,H*0.007),0,TWO_PI);ctx.fill();
  }

  function background(g, resolveAmt, now){
    const th=theme();
    const top = th.resolve ? mix(th.bgTop, th.brandBg, resolveAmt) : hexRGB(th.bgTop);
    const bot = th.resolve ? mix(th.bgBot, th.brandBg, resolveAmt) : hexRGB(th.bgBot);
    let bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,rgba(top,1));bg.addColorStop(1,rgba(bot,1));
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    const dim=(1-resolveAmt);
    if(th.nebula && dim>0.01){
      const blobs=[[W*0.7,H*0.35,'#ff6a22',0.10],[W*0.25,H*0.7,'#6f3fa1',0.08]];
      ctx.save();ctx.globalCompositeOperation='lighter';
      for(const[bx,by,col,al] of blobs){
        let n=ctx.createRadialGradient(bx,by,0,bx,by,Math.max(W,H)*0.5);
        n.addColorStop(0,rgba(hexRGB(col),al*dim));n.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=n;ctx.fillRect(0,0,W,H);
      }
      ctx.restore();
    }
    if(th.stars && starsEl.checked && dim>0.01){
      const drift=(now/1000)*8;
      ctx.save();ctx.globalCompositeOperation='lighter';
      for(const s of stars){
        let x=((s.x - drift*s.par)%W+W)%W;
        const tw=0.6+0.4*Math.sin(now/1000*s.sp+s.tw);
        ctx.fillStyle=rgba([220,228,245], s.a*tw*dim);
        ctx.beginPath();ctx.arc(x,s.y,s.r,0,TWO_PI);ctx.fill();
      }
      ctx.restore();
    }
  }

  function vignette(){
    let v=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.72);
    v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(0,0,0,0.45)');
    ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
  }

  // ---------- main loop ----------
  function frame(now){
    if(!startT) startT=now;
    const g=geom();
    const wall=Math.min((now-startT)/(g.dur*1000),1);
    const eased=smoother(wall);
    const t=eased*g.dur;
    const resolveAmt = theme().resolve
      ? smoother((wall-RESOLVE_START)/(1-RESOLVE_START)) : 0;

    const px=planetX(g,t);
    const orbitProg=t/g.period;
    const full=Math.floor(orbitProg);
    const partial=orbitProg-full;

    // active orbit uses the RAAN it will have at its completion (matches deposit)
    const activeRaan=raanAt(g, Math.min((full+1)*g.period, g.dur));
    const satTheta=partial*TWO_PI;
    const sat=pt(g, px, activeRaan, satTheta);

    // re-render settled traces only when the set changes (or during resolve)
    const s=paramSig(g);
    if(s!==sig){sig=s;settledCount=-1;}
    const wantSettled=full;                 // orbits 1..full-1 are "settled"
    if(settledCount!==wantSettled || resolveAmt>0 || theme().flat){
      renderTraces(g, wantSettled, resolveAmt);
      settledCount=wantSettled;
    }

    // ---- compose ----
    ctx.setTransform(DPR,0,0,DPR,0,0);
    background(g, resolveAmt, now);

    // settled traces (frozen in space)
    ctx.setTransform(1,0,0,1,0,0);
    ctx.drawImage(trace,0,0);
    ctx.setTransform(DPR,0,0,DPR,0,0);

    // most-recently-completed orbit, fading in
    if(full>=1){
      const age=t-full*g.period;
      const depA=smoother(age/(g.period*0.45));
      strokeOrbit(ctx, g, planetX(g,full*g.period), raanAt(g,full*g.period), depA, resolveAmt, null);
    }

    // active orbit — back half, behind planet
    if(wall<1 || loopEl.checked){
      if(sat.z<0){ drawSatellite(g, sat, resolveAmt); }
      drawPlanet(g, px, resolveAmt);
      // active partial path on top of planet
      strokeOrbitActive(g, px, activeRaan, satTheta, resolveAmt);
      if(sat.z>=0){ drawSatellite(g, sat, resolveAmt); }
    } else {
      drawPlanet(g, px, resolveAmt);
    }

    vignette();

    // status
    raanReadout(g,t,full);

    // trail
    trail.push({x:sat.x,y:sat.y}); if(trail.length>20) trail.shift();

    if(wall>=1){
      if(loopEl.checked){ startT=now; trail=[]; }
      // else: keep looping the RAF for star twinkle on the finished mark
    }
    rafId=requestAnimationFrame(frame);
  }

  // active orbit drawn with a soft glow pass
  function strokeOrbitActive(g, cx, raan, theta, resolveAmt){
    const th=theme();
    if(th.glow && resolveAmt<0.9){
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.shadowColor=th.accent;ctx.shadowBlur=8;
      const acc=hexRGB(th.accent);
      ctx.strokeStyle=rgba(acc,0.5*(1-resolveAmt));ctx.lineWidth=1.4*(H/620);ctx.lineCap='round';
      let prev=pt(g,cx,raan,0);
      const steps=Math.max(2,Math.ceil(SEG*(theta/TWO_PI)));
      ctx.beginPath();ctx.moveTo(prev.x,prev.y);
      for(let i=1;i<=steps;i++){const p=pt(g,cx,raan,(i/steps)*theta);ctx.lineTo(p.x,p.y);}
      ctx.stroke();ctx.restore();
    }
    strokeOrbit(ctx, g, cx, raan, 1, resolveAmt, theta);
  }

  function restart(){startT=0;trail=[];settledCount=-1;sig="";if(rafId)cancelAnimationFrame(rafId);rafId=requestAnimationFrame(frame);}

  // ---------- UI ----------
  const durEl=document.getElementById('dur'), orbEl=document.getElementById('orb');
  const durV=document.getElementById('dur-v'), orbV=document.getElementById('orb-v');
  const loopEl=document.getElementById('loop'), planetEl=document.getElementById('planet'), starsEl=document.getElementById('stars');
  const presetsEl=document.getElementById('presets');

  function raanReadout(){/* reserved for optional on-canvas HUD */}

  Object.keys(THEMES).forEach(k=>{
    const b=document.createElement('button');
    b.textContent=THEMES[k].label;b.dataset.k=k;
    if(k===themeKey)b.classList.add('active');
    b.onclick=()=>{themeKey=k;[...presetsEl.children].forEach(c=>c.classList.toggle('active',c.dataset.k===k));settledCount=-1;sig="";};
    presetsEl.appendChild(b);
  });

  durEl.oninput=()=>{durV.textContent=durEl.value+'s';restart();};
  orbEl.oninput=()=>{orbV.textContent=orbEl.value;restart();};
  document.getElementById('replay').onclick=restart;
  planetEl.onchange=()=>{settledCount=-1;};
  starsEl.onchange=()=>{settledCount=-1;};

  const recBtn=document.getElementById('rec'), recExit=document.getElementById('rec-exit');
  function toggleRec(on){document.body.classList.toggle('rec',on);requestAnimationFrame(()=>{resize();});}
  recBtn.onclick=()=>toggleRec(true);
  recExit.onclick=()=>toggleRec(false);
  window.addEventListener('keydown',e=>{if(e.key==='Escape')toggleRec(false);});

  // ---------- go ----------
  durV.textContent=durEl.value+'s';orbV.textContent=orbEl.value;
  resize();restart();
})();
</script>
</body>
</html>
